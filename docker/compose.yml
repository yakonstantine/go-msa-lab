services:

  db-server:
    image: postgres:18-alpine
    restart: always 
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: P@ssw0rd
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5
  
  user-service:
    restart: unless-stopped
    build: ../services/user-service
    depends_on:
      db-server:
        condition: service_healthy